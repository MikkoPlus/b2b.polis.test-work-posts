version: "3.9"

services:
  app:
    build:
      context: ./back
      dockerfile: ../docker/php/Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./back:/var/www
    depends_on:
      - db
    command: >
      sh -c "echo 'Waiting DB...' && sleep 10 &&
      if [ ! -f storage/.migrated ]; then
      php artisan migrate --force && php artisan db:seed --force && touch storage/.migrated;
      fi &&
      php-fpm"
    networks:
      - appnet

  frontend:
    image: node:20
    container_name: react_frontend
    working_dir: /app
    volumes:
      - ./front:/app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - app
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d
      - ./back:/var/www
    depends_on:
      - app
      - frontend
    networks:
      - appnet

  db:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - appnet

networks:
  appnet:

volumes:
  dbdata:
